set -euo pipefail

TEAMS_WEBHOOK_URL="$(printf '%s' "$TEAMS_WEBHOOK_URL" | tr -d '\r\n')"

ENV_NAME="UNKNOWN"
case "$BASE_BRANCH" in
  main|master) ENV_NAME="PROD" ;;
  release/*)   ENV_NAME="UAT" ;;
  develop|dev) ENV_NAME="DEV" ;;
  qa|test)     ENV_NAME="QA" ;;
  *)           ENV_NAME="$BASE_BRANCH" ;;
esac

# ✅ Only notify for QA and PROD
if [ "$ENV_NAME" != "QA" ] && [ "$ENV_NAME" != "PROD" ]; then
  echo "Skipping Teams notification for ENV_NAME=$ENV_NAME"
  exit 0
fi

payload="$(jq -n \
  --arg repo "$REPO" \
  --arg pr_title "$PR_TITLE" \
  --arg pr_url "$PR_URL" \
  --arg author "$PR_AUTHOR" \
  --arg base "$BASE_BRANCH" \
  --arg env "$ENV_NAME" \
  '{
    "@type":"MessageCard",
    "@context":"http://schema.org/extensions",
    "summary":"PR merged",
    "themeColor":"2EB886",
    "title":("PR Merged -> " + $env),
    "sections":[
      {
        "facts":[
          {"name":"Repository","value":$repo},
          {"name":"PR","value":("[" + $pr_title + "](" + $pr_url + ")")},
          {"name":"Author","value":$author},
          {"name":"Base Branch","value":$base},
          {"name":"Environment","value":$env}
        ],
        "markdown":true
      }
    ]
  }'
)"

curl -sS -X POST "$TEAMS_WEBHOOK_URL" \
  -H "Content-Type: application/json" \
  -d "$payload"
