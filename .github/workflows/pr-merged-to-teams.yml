# .github/workflows/pr-merged-to-teams.yml
# Purpose:
# - When a PR is merged, post a Teams message ONLY for STAGING / QA / PROD.
# - Color-code the Teams card by environment:
#     STAGING = Yellow, QA = Blue, PROD = Green
# - Use a clean, environment-specific title:
#     "STAGING Deployment" / "QA Validation Phase" / "PROD Release"

name: Notify Teams on PR Merge

# Trigger: only when a PR is closed (we later check that it was actually merged)
on:
  pull_request:
    types: [closed]

jobs:
  notify:
    # Gate: run only if the PR was merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Send PR merge info to Teams
        # Provide PR metadata + Teams webhook to the shell script below
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.repository }}

        run: |
          # Fail fast on errors, undefined vars, and pipeline issues
          set -euo pipefail

          # --- Block 1: Normalize webhook URL ---
          # What should happen:
          # - Remove hidden CR/LF characters (common copy/paste issue) so curl won't error with "Malformed input"
          TEAMS_WEBHOOK_URL="$(printf '%s' "$TEAMS_WEBHOOK_URL" | tr -d '\r\n')"

          # --- Block 2: Map base branch -> environment ---
          # What should happen:
          # - Translate the PR target branch into the environment name used for notifications
          # Adjust these mappings to your branching strategy as needed.
          ENV_NAME="UNKNOWN"
          case "$BASE_BRANCH" in
            main|master) ENV_NAME="PROD" ;;
            release/*)   ENV_NAME="STAGING" ;;
            qa|test)     ENV_NAME="QA" ;;
            develop|dev) ENV_NAME="DEV" ;;
            *)           ENV_NAME="$BASE_BRANCH" ;;
          esac

          # --- Block 3: Filter which environments should notify ---
          # What should happen:
          # - Only STAGING / QA / PROD generate a Teams notification
          # - Everything else exits successfully without posting (prevents noise)
          if [ "$ENV_NAME" != "STAGING" ] && [ "$ENV_NAME" != "QA" ] && [ "$ENV_NAME" != "PROD" ]; then
            echo "Skipping Teams notification for ENV_NAME=$ENV_NAME (BASE_BRANCH=$BASE_BRANCH)"
            exit 0
          fi

          # --- Block 4: Assign color + clean title by environment ---
          # What should happen:
          # - Set Teams MessageCard themeColor based on environment
          # - Set a clean title (no duplication)
          THEME_COLOR="808080"       # default gray (shouldn't be used due to filter)
          TITLE_PREFIX="PR Update"   # default fallback

          if [ "$ENV_NAME" = "STAGING" ]; then
            THEME_COLOR="FFCC00"           # Yellow
            TITLE_PREFIX="STAGING Deployment"
          elif [ "$ENV_NAME" = "QA" ]; then
            THEME_COLOR="0078D4"           # Blue
            TITLE_PREFIX="QA Validation Phase"
          elif [ "$ENV_NAME" = "PROD" ]; then
            THEME_COLOR="107C10"           # Green
            TITLE_PREFIX="PROD Release"
          fi

          # --- Block 5: Build JSON payload safely ---
          # What should happen:
          # - Use jq to generate valid JSON even if PR title contains quotes/special chars
          # - Create a MessageCard compatible with Teams workflow webhooks
          payload="$(jq -n \
            --arg repo "$REPO" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_url "$PR_URL" \
            --arg author "$PR_AUTHOR" \
            --arg base "$BASE_BRANCH" \
            --arg env "$ENV_NAME" \
            --arg color "$THEME_COLOR" \
            --arg titlePrefix "$TITLE_PREFIX" \
            '{
              "@type":"MessageCard",
              "@context":"http://schema.org/extensions",
              "summary":"PR merged",
              "themeColor": $color,
              "title": $titlePrefix,
              "sections":[
                {
                  "facts":[
                    {"name":"Repository","value":$repo},
                    {"name":"PR","value":("[" + $pr_title + "](" + $pr_url + ")")},
                    {"name":"Author","value":$author},
                    {"name":"Base Branch","value":$base},
                    {"name":"Environment","value":$env}
                  ],
                  "markdown":true
                }
              ]
            }'
          )"

          # --- Block 6: POST to Teams webhook ---
          # What should happen:
          # - Send the card to the Teams channel via the workflow webhook URL
          # - If it fails, the step fails and you'll see the error in Actions logs
          curl -sS -X POST "$TEAMS_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
